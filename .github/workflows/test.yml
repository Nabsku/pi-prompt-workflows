name: Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feat/**

permissions:
  contents: read

jobs:
  test:
    name: Node 24 tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Check package contents
        run: npm pack --dry-run
